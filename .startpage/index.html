<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge"> 
    <title>Page d’accueil</title>
    <link rel="stylesheet" href="styles.css">
    <link href="favicon.png" rel="shortcut icon" type="image/x-icon" />
  </head>
  <body>
    <div class="container">
      <div id="clock"></div>
      <div id="date"></div>
      <div class="Search-container">
        <div class="row">
          <div id="Search-description"class="inline"></div>
          <div class="inline">
            <form method="get" action="https://www.google.com/search">
              <input type="text" autofocus="autofocus" name="q"  class="search-bar" placeholder="Search"\>
            </form>
          </div>
          <div id="temp" class="inline"></div>
        </div>
      </div>
      <div class="bookmark-container">
        <div class="bookmark-set">
          <div class="bookmark-title">Google</div>
          <div class="bookmark-inner-container">
            <a class="bookmark" href="https://gmail.com/" target="_blank">Gmail</a>
            <a class="bookmark" href="https://youtube.com" target="_blank">Youtube</a>
            <a class="bookmark" href="https://drive.google.com" target="_blank">Drive</a>
          </div>
        </div>
        <div class="bookmark-set">
        <div class="bookmark-title">Réseaux Sociaux</div>
          <div class="bookmark-inner-container">
            <a class="bookmark" href="https://facebook.com/" target="_blank">Facebook</a>
            <a class="bookmark" href="https://instagram.com/" target="_blank">Instagram</a>
            <a class="bookmark" href="https://twitter.com/" target="_blank">Twitter</a>
          </div>
        </div>
        <div class="bookmark-set">
        <div class="bookmark-title">Autres</div>
          <div class="bookmark-inner-container">
            <a class="bookmark" href="https://github.com/" target="_blank">Github</a>
            <a class="bookmark" href="https://reddit.com/" target="_blank">Reddit</a>
            <a class="bookmark" href="https://wallhaven.cc/" target="_blank">Wallhaven</a>
            <a class="bookmark" href="https://unsplash.com/" target="_blank">Unsplash</a>
          </div>
        </div>
      </div>
    </div>
    <script>
      function getTime() {
        let date = new Date(),
            min = date.getMinutes(),
            sec = date.getSeconds(),
            hour = date.getHours();
          return "" + 
            (hour < 10 ? ("0" + hour) : hour) + ":" + 
            (min < 10 ? ("0" + min) : min) + ":" + 
            (sec < 10 ? ("0" + sec) : sec);
      }
      window.onload = () => {
          document.getElementById("clock").innerHTML = getTime();
          setInterval( () => {
              document.getElementById("clock").innerHTML = getTime();
          },100);
      }
    </script>
    <script>
      const d = new Date()
      const year = d.getFullYear()
      const date = d.getDate()
      const months = [
        'Janvier',
        'Fevrier',
        'Mars',
        'Avril',
        'Mai',
        'Juin',
        'Juillet',
        'Août',
        'Septembre',
        'Octobre',
        'Novembre',
        'Decembre'
      ]
      const monthIndex = d.getMonth()
      const monthName = months[monthIndex]
      const days = [
        'Dimanche',
        'Lundi',
        'Mardi',
        'Mercredi',
        'Jeud',
        'Vendredi',
        'Samedi'
      ]
      const dayIndex = d.getDay()
      const dayName = days[dayIndex]
      const formatted = `${dayName}, ${date} ${monthName} ${year}`
      var dt = new Date();
      document.getElementById("date").innerHTML = formatted;
    </script>
  </body>
</html>
